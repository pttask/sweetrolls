{% extends 'base.html' %}

{% block content %}
<!-- Beri padding atas agar tidak tertutup navbar -->
<div class="container pt-5 mt-5">
    <h2 class="text-center mb-5 mt-4 text-dark" style="font-size: 2.5rem;">Explore Delicious Taste</h2>
    
    <!-- Menggunakan col-md-8 offset-md-2 agar konten berada di tengah dan tidak terlalu lebar -->
    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <!-- Produk 1 -->
            <div class="product-card mb-4 d-flex align-items-center text-start">
                <div class="product-img-container me-4 flex-shrink-0">
                    <img src="{{ url_for('static', filename='img/banana.png') }}" alt="Banana Rolls">
                </div>
                <div class="flex-grow-1">
                    <h3 class="mb-1">Banana Rolls</h3>
                    <p class="text-muted fw-bold mb-3">Rp 10.000</p>
                </div>
                <div>
                    <a href="{{ url_for('checkout') }}" class="btn btn-outline-warning text-dark fw-bold px-4 rounded-pill border-2" style="border-color: #f8b400;">Buy Now</a>
                </div>
            </div>

            <!-- Produk 2 -->
            <div class="product-card mb-4 d-flex align-items-center text-start">
                <div class="product-img-container me-4 flex-shrink-0">
                    <img src="{{ url_for('static', filename='img/banana choco.png') }}" alt="Choco Rolls">
                </div>
                <div class="flex-grow-1">
                    <h3 class="mb-1">Choco Rolls</h3>
                    <p class="text-muted fw-bold mb-3">Rp 12.000</p>
                </div>
                <div>
                    <a href="{{ url_for('checkout') }}" class="btn btn-outline-warning text-dark fw-bold px-4 rounded-pill border-2" style="border-color: #f8b400;">Buy Now</a>
                </div>
            </div>

            <!-- Produk 3 -->
            <div class="product-card mb-4 d-flex align-items-center text-start">
                <div class="product-img-container me-4 flex-shrink-0">
                    <img src="{{ url_for('static', filename='img/banana cheese.png') }}" alt="Cheese Rolls">
                </div>
                <div class="flex-grow-1">
                    <h3 class="mb-1">Cheese Rolls</h3>
                    <p class="text-muted fw-bold mb-3">Rp 12.000</p>
                </div>
                <div>
                    <a href="{{ url_for('checkout') }}" class="btn btn-outline-warning text-dark fw-bold px-4 rounded-pill border-2" style="border-color: #f8b400;">Buy Now</a>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
