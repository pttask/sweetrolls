{% extends 'base.html' %}

{% block content %}
<div class="container pt-5 mt-5">
    <div class="checkout-container mx-auto" style="max-width: 900px; margin-top: 2rem; margin-bottom: 4rem;">
        <h2 class="text-center mb-5 text-dark">Checkout Pesanan</h2>
        
        <div class="row g-5">
            <!-- Kolom Form (Kiri) -->
            <div class="col-md-7">
                <h4 class="mb-4">Detail Pengiriman</h4>
                <form action="{{ url_for('checkout') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control form-control-lg bg-light border-0" placeholder="Masukkan nama..." required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Nomor WhatsApp</label>
                        <input type="number" name="whatsapp" class="form-control form-control-lg bg-light border-0" placeholder="08xxxxxxxxxx" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Alamat Lengkap</label>
                        <textarea name="alamat" class="form-control form-control-lg bg-light border-0" rows="3" placeholder="Sertakan patokan jalan..." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-dark btn-lg w-100 rounded-pill fw-bold mt-2" style="background-color: #212529;">Selesaikan Pesanan</button>
                </form>
            </div>
            
            <!-- Kolom Ringkasan (Kanan) -->
            <div class="col-md-5">
                <div class="p-4 rounded-4" style="background-color: #fdf5c9; border: 2px dashed #e8d085;">
                    <h4 class="mb-4">Ringkasan</h4>
                    
                    <div class="d-flex justify-content-between mb-3">
                        <span class="fw-bold">Produk Pilihan</span>
                        <span>(Sesuai Keranjang)</span>
                    </div>
                    
                    <hr style="border-color: #d4b85c;">
                    
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-secondary">Subtotal</span>
                        <span class="fw-bold">Rp -</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-secondary">Ongkos Kirim</span>
                        <span class="fw-bold">Hitung Nanti</span>
                    </div>
                    
                    <hr style="border-color: #d4b85c;">
                    
                    <div class="d-flex justify-content-between mt-3">
                        <h5 class="fw-bold mb-0">Total</h5>
                        <h5 class="fw-bold mb-0" style="color: #d35400;">Rp -</h5>
                    </div>
                    
                    <p class="text-muted small mt-4 text-center">
                        *Pembayaran akan diinstruksikan melalui WhatsApp setelah pesanan diselesaikan.
                    </p>
                </div>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
