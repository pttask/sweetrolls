{% extends 'base.html' %}

{% block content %}
<section id="home-section" class="hero bg-banana d-flex align-items-center">
    <div class="container">
        <div class="row align-items-center w-100">
            
            <!-- Teks Kiri -->
            <div class="col-md-6 order-2 order-md-1 mt-4 mt-md-0 ps-md-5">
                <h1 id="hero-title" class="display-3 text-dark mb-3" style="transition: opacity 0.3s ease; font-size: 4.5rem; line-height: 1.1;">BANANA<br>ROLLS</h1>
                <p id="hero-desc" class="lead text-dark mb-4" style="transition: opacity 0.3s ease; font-size: 1.2rem;">Crispy Outside, Sweet Inside<br>Perfect in Everybite</p>
                
                <a href="{{ url_for('products') }}" class="btn btn-dark btn-lg rounded-pill fw-bold px-4 mb-4" style="background-color: #212529; border: none;">Explore Menu</a>
                
                <!-- Tombol Animasi Flavour (JS) -->
                <div class="flavor-selector">
                    <div class="flavor-btn active" onclick="changeFlavor('banana')">🍌</div>
                    <div class="flavor-btn" onclick="changeFlavor('choco')">🍫</div>
                    <div class="flavor-btn" onclick="changeFlavor('cheese')">🧀</div>
                </div>
            </div>

            <!-- Gambar Kanan -->
            <div class="col-md-6 order-1 order-md-2 text-center hero-image">
                <img id="main-image" src="{{ url_for('static', filename='img/banana.png') }}" alt="Banana Rolls" class="shadow">
            </div>

        </div>
    </div>
</section>
{% endblock %}
